services:
  db:
    image: postgres:18
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: limelight
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d limelight"]
      interval: 5s
      timeout: 5s
      retries: 5

  rdb:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  db-migration:
    build:
      context: .
      dockerfile: Dockerfile.migration
    environment:
      DATABASE_URL: ${DATABASE_URL}
    # Using single quotes prevents host-machine shell interpolation issues
    command: -database '${DATABASE_URL}' up
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      LIMELIGHT_DB_DSN: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      db:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
      rdb:
        condition: service_started

volumes:
  db_data:
  redis_data:
